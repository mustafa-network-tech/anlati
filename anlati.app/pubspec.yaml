name: anlati_app
description: ANLATI — Premium Sosyal Hikâye Platformu
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.7.0

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Secure storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Environment variables
  flutter_dotenv: ^5.2.1

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Fonts
  google_fonts: ^6.2.1

  # UI
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  timeago: ^3.7.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
